<header class="site-header">
  <div class="container">
    <div class="header-content">
      <a routerLink="/home" class="logo-link">
        <img src="assets/private/logo.png" alt="Sarthak Enterprises Logo">
      </a>
      <nav class="main-nav">
        <ul class="nav-list" [class.active]="isMenuOpen">
          <li><a routerLink="/about" (click)="closeMenu()">About</a></li>
          <li><a routerLink="/services" (click)="closeMenu()">Services</a></li>
          <li><a routerLink="/projects" (click)="closeMenu()">Projects</a></li>
          <li><a routerLink="/credentials" (click)="closeMenu()">Credentials</a></li>
          <li><a routerLink="/contact" (click)="closeMenu()">Contact</a></li>
        </ul>
      </nav>
      <button class="menu-toggle" (click)="toggleMenu()">
        <span class="hamburger-icon"></span>
      </button>
    </div>
  </div>
</header>
